<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Viewport optimisé pour mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Titre et description -->
    <title>SOS Africa - Sécurité Personnelle</title>
    <meta name="description" content="Application de sécurité personnelle pour alerter vos proches en cas de danger. Fonctionne hors connexion." />
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="SOS Africa" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SOS Africa" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Thème couleur -->
    <meta name="theme-color" content="#04060B" />
    <meta name="msapplication-TileColor" content="#FF2E3F" />

    <!-- Icônes -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Manifest pour PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Polices design premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Leaflet (carte interactive) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Preconnect pour les ressources externes -->
    <link rel="preconnect" href="https://www.google.com" />
    <link rel="preconnect" href="https://maps.google.com" />
    
    <!-- Désactiver le format de détection automatique des téléphones -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Empêcher la mise en cache pour les mises à jour -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Style inline pour éviter le flash blanc au chargement -->
    <style>
      html {
        margin: 0;
        padding: 0;
        background-color: #04060B;
        height: 100%;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #04060B;
        min-height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Loading state */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: radial-gradient(1200px 800px at 20% 0%, rgba(255,46,63,0.12), transparent 60%), #04060B;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      #loading-screen.hidden {
        display: none;
      }

      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 46, 63, 0.18);
        border-top-color: #FF2E3F;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 24px rgba(255, 46, 63, 0.45);
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Écran de chargement -->
    <div id="loading-screen">
      <div class="loading-spinner"></div>
    </div>
    
    <!-- Application React -->
    <div id="root"></div>
    
    <!-- Script pour masquer le loading screen -->
    <script>
      window.addEventListener('load', function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          setTimeout(function() {
            loadingScreen.classList.add('hidden');
          }, 500);
        }
      });
    </script>
    
    <!-- Module principal -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
